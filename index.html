<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBuilding - Login</title>
    <link rel="stylesheet" href="css/styles.css?v=1.3">
</head>
<body class="login-page-body">

    <div class="login-card">
        <h2>SmartBuilding</h2>
        
        <form action="login.php" method="POST">
            <div class="form-group">
                <label>ID de Utilizador:</label>
                <input type="text" name="user_id" placeholder="Ex: AG1, E1AL1, E1A1CLT1" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Palavra-passe:</label>
                <input type="password" name="password" placeholder="Sua password" required>
            </div>
            
            <button type="submit" class="btn-submit" style="margin-top: 0.5rem;">Iniciar Sessão</button>
        </form>
    </div>
<script src="js/mensagens.js"></script>
</body>
</html>
